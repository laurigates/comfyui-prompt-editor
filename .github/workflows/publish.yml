name: Publish to Comfy Registry

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-node:
    name: Publish custom node to registry
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies and build frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@d2366e7abb6ab16f3bb03e3520ae25c8cf749bc9 # main: skip_checkout support
        with:
          # PAT issued at https://registry.comfy.org/, stored as the
          # REGISTRY_ACCESS_TOKEN repo secret.
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
          # Skip the action's internal checkout, which would wipe the
          # git-ignored web/dist built above. Requires the pinned main ref.
          skip_checkout: 'true'
